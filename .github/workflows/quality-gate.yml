name: DEVORQ Quality Gate

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality-bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install shellcheck and bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck bats

      - name: Shellcheck — bin e lib
        run: |
          shellcheck --severity=error bin/devorq
          shellcheck --severity=error lib/*.sh
          shellcheck --severity=error lib/**/*.sh 2>/dev/null || shellcheck --severity=error lib/orchestration/*.sh

      - name: Bats — suite completa
        run: |
          bats tests/flow.bats tests/functional.bats tests/hooks.bats \
              tests/paths.bats tests/skills.bats tests/sourcing.bats \
              tests/sprint1.bats tests/sprint2.bats tests/sprint3.bats tests/sprint4.bats

  quality-generic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: No specific quality gates for generic stack
        run: echo "Generic stack - no additional gates defined"
