name: DEVORQ Quality Gate

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality-bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install shellcheck and bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck bats

      - name: Shellcheck — bin e lib
        run: |
          shellcheck --severity=error bin/devorq
          shellcheck --severity=error lib/*.sh
          shellcheck --severity=error lib/**/*.sh 2>/dev/null || shellcheck --severity=error lib/orchestration/*.sh

      - name: Bats — suite completa
        run: |
          bats tests/flow.bats tests/functional.bats tests/hooks.bats \
              tests/paths.bats tests/skills.bats tests/sourcing.bats \
              tests/sprint1.bats tests/sprint2.bats tests/sprint3.bats tests/sprint4.bats

  quality-generic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Bash syntax check — todos os scripts
        run: |
          bash -n bin/devorq
          for f in lib/*.sh lib/**/*.sh; do
            [[ -f "$f" ]] && bash -n "$f"
          done

      - name: Shellcheck — severity warning (não-erro)
        run: |
          shellcheck --severity=warning bin/devorq || true
          shellcheck --severity=warning lib/*.sh || true

      - name: Validar estrutura de skills
        run: |
          for skill_dir in .devorq/skills/*/; do
            skill_name=$(basename "$skill_dir")
            if [[ ! -f "${skill_dir}SKILL.md" ]]; then
              echo "ERRO: skill '$skill_name' sem SKILL.md"
              exit 1
            fi
            if [[ ! -f "${skill_dir}CHANGELOG.md" ]]; then
              echo "AVISO: skill '$skill_name' sem CHANGELOG.md"
            fi
          done
          echo "Estrutura de skills OK"
