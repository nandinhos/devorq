services:
    laravel.test:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                WWWUSER: '${WWWUSER:-1000}'
                WWWGROUP: '${WWWGROUP:-1000}'
        image: sail-8.4/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-8900}:8000'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
            DEVORQ_DIR: '${PWD}/.devorq'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql

    pgsql:
        image: 'postgres:16'
        ports:
            - '${FORWARD_DB_PORT:-54320}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:?DB_PASSWORD obrigatorio — configure no .env}'
            POSTGRES_DB: '${DB_DATABASE:?DB_DATABASE obrigatorio — configure no .env}'
            POSTGRES_USER: '${DB_USERNAME:?DB_USERNAME obrigatorio — configure no .env}'
            POSTGRES_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s

    pgadmin:
        image: dpage/pgadmin4
        ports:
            - '${PGADMIN_PORT:-8950}:80'
        environment:
            PGADMIN_DEFAULT_EMAIL: '${PGADMIN_EMAIL:-admin@admin.com}'
            PGADMIN_DEFAULT_PASSWORD: '${PGADMIN_PASSWORD:?PGADMIN_PASSWORD obrigatorio — configure no .env}'
        networks:
            - sail
        depends_on:
            - pgsql

networks:
    sail:
        driver: bridge

volumes:
    sail-pgsql:
        driver: local
